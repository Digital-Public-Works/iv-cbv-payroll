name: Deploy to A11y Environment
# Need to set a default value for when the workflow is triggered from a git push
# which bypasses the default configuration for inputs
run-name: Deploy ${{ github.ref_name }} to A11y Environment

on:
  push:
    branches:
      - "release-a11y"
    paths:
      - "app/**"
      - "bin/**"
      - "infra/**"
permissions:
    id-token: write

jobs:
  deploy:
    permissions:
      contents: write
      id-token: write
    name: Deploy
    uses: ./.github/workflows/deploy.yml
    with:
      app_name: "app"
      environment: "a11y"
    secrets: inherit
