name: Deprovision A11y Service

on:
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  deprovision:
    name: Deprovision A11y Service
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Require release-a11y branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/release-a11y" ]; then
            echo "❌ Error: This workflow can only be triggered from the release-a11y branch"
            echo "Current branch: ${{ github.ref }}"
            exit 1
          fi
          echo "✅ Verified: running on release-a11y branch"

      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: ./.github/actions/setup-terraform

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          app_name: "app"
          environment: "a11y"

      - name: Verify AWS account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACCOUNT_ID" != "929368846564" ]; then
            echo "❌ Error: Wrong AWS account!"
            echo "Expected: 929368846564"
            echo "Got: $ACCOUNT_ID"
            exit 1
          fi
          echo "✅ Verified: correct AWS account"

      - name: Deprovision service infrastructure
        working-directory: infra/app/service
        run: |
          echo "Deprovisioning A11y service layer (ECS, ALB, Cognito, etc.)..."
          echo "Note: RDS database, backups, logs, and SQS DLQ will be preserved."
          terraform init -input=false -reconfigure -backend-config="a11y.s3.tfbackend"

          # Disable ALB deletion protection before destroy
          ALB_ARN=$(aws elbv2 describe-load-balancers --names app-a11y --region us-east-1 2>/dev/null | jq -r '.LoadBalancers[0].LoadBalancerArn // empty' || echo "")
          if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "null" ]; then
            echo "Disabling deletion protection on ALB..."
            aws elbv2 modify-load-balancer-attributes \
              --load-balancer-arn "$ALB_ARN" \
              --attributes Key=deletion_protection.enabled,Value=false || true
          fi

          # Delete SQS DLQ directly (ephemeral environment, no need to preserve)
          DLQ_URL=$(aws sqs get-queue-url --queue-name report_sender_dlq_a11y --region us-east-1 2>/dev/null | jq -r '.QueueUrl' || echo "")
          if [ -n "$DLQ_URL" ] && [ "$DLQ_URL" != "null" ]; then
            echo "Deleting SQS DLQ..."
            aws sqs delete-queue --queue-url "$DLQ_URL" 2>/dev/null || true
          fi

          # Remove DLQ from state to avoid Terraform errors
          terraform state rm -lock=false 'module.sqs_queues.aws_sqs_queue.dlq' 2>/dev/null || true

          terraform destroy -input=false -auto-approve -var="environment_name=a11y"
          echo "A11y service deprovisioned successfully"
