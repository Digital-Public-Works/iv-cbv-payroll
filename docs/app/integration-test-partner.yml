# ==========================================
# INTEGRATION TEST PARTNER CONFIGURATION
# Purpose: Partner for local e2e testing against Docker services.
# Requires docker-compose.integration.yml services to be running.
#
# Setup:
#   1. Start Docker services:
#      docker compose -f docker-compose.integration.yml up -d
#
#   2. Run the integration setup rake task:
#      bundle exec rake integration:setup
#
#   3. Start the Rails server and visit /cbv/links/integration_test
# ==========================================

---
partner_id: integration_test
name: Integration Test Partner
state_name: Testonia
timezone: America/New_York
domain: integration-test
website: https://integration-test.example.org/
# Inline SVG "INTTEST" badge — dev-only placeholder, no external asset dependency
logo_path: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 80'><rect width='200' height='80' fill='%231B5E8C' rx='8'/><text x='100' y='50' text-anchor='middle' fill='white' font-family='Helvetica,Arial,sans-serif' font-weight='bold' font-size='28' letter-spacing='2'>INTTEST</text></svg>"
argyle_environment: sandbox
active_demo: true
active_prod: false
pilot_ended: false
staff_portal_enabled: false
generic_links_enabled: false
invitation_links_enabled: true
invitation_valid_days_default: 10
pay_income_days_w2: 90
pay_income_days_gig: 90
report_customization_show_earnings_list: true
weekly_report_enabled: false
transmission_methods:
- method_type: webhook
  configs:
  - key: webhook_url
    encrypted: false
    value: "http://localhost:9292/api/v1/income-report"
  - key: api_key
    encrypted: false
    value: "my-secure-guid"
- method_type: sftp
  configs:
  - key: url
    encrypted: false
    value: "localhost"
  - key: port
    encrypted: false
    value: "2222"
  - key: user
    encrypted: false
    value: "testuser"
  - key: password
    encrypted: false
    value: "testpass"
  - key: sftp_directory
    encrypted: false
    value: "upload"
application_attributes:
- name: case_number
  description: Case number
  required: true
  data_type: string
  form_field_type: text_field
  show_on_applicant_form: true
  show_on_caseworker_form: true
  show_on_caseworker_report: true
  redactable: false
- name: first_name
  description: Applicant first name
  required: false
  data_type: string
  form_field_type: text_field
  show_on_applicant_form: false
  show_on_caseworker_form: true
  show_on_caseworker_report: false
  redactable: true
  redact_type: string
- name: last_name
  description: Applicant last name
  required: false
  data_type: string
  form_field_type: text_field
  show_on_applicant_form: false
  show_on_caseworker_form: true
  show_on_caseworker_report: false
  redactable: true
  redact_type: string
translations:
  en:
    shared.agency_acronym: 'INTTEST'
    shared.agency_full_name: 'Integration Test Partner'
    shared.header.cbv_flow_title: 'Integration Test'
    shared.header.preheader: 'Integration test partner for verifying transmitters against Docker services.'
    shared.benefit: 'Test Benefits'
    shared.reporting_purpose: 'integration testing'
    shared.agency_portal_name: 'Integration Test Portal'
    shared.app_name: 'Integration Test App'
    .header: 'Integration Test Partner'
    .description: 'This partner is configured for integration testing.'
    .continue_to_login: 'Continue to log in page'
    applicant_mailer.invitation_email.header: 'Integration Test Partner has sent you an invitation to verify your income'
    cbv.submits.show.pdf.agency_header_name: 'Integration Test Partner'
  es:
    shared.agency_acronym: 'INTTEST'
    shared.agency_full_name: 'Socio de Prueba'
    shared.header.cbv_flow_title: 'Prueba de Integracion'
    shared.header.preheader: 'Socio de prueba para verificar transmisores contra servicios Docker.'
    shared.benefit: 'Beneficios de Prueba'
    shared.reporting_purpose: 'prueba de integracion'
    shared.agency_portal_name: 'Portal de Prueba'
    shared.app_name: 'Aplicacion de Prueba'
    .header: 'Socio de Prueba'
    .description: 'Este socio esta configurado para pruebas de integracion.'
    .continue_to_login: 'Continuar a la pagina de inicio de sesion'
    applicant_mailer.invitation_email.header: 'Socio de Prueba le ha enviado una invitacion para verificar sus ingresos'
    cbv.submits.show.pdf.agency_header_name: 'Socio de Prueba'
