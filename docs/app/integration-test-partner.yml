  description: Case number
  required: true
  data_type: string
  form_field_type: text_field
  show_on_applicant_form: true
  show_on_caseworker_form: true
  show_on_caseworker_report: true
  redactable: false
- name: first_name
  description: Applicant first name
  required: false
  data_type: string
  form_field_type: text_field
  show_on_applicant_form: false
  show_on_caseworker_form: true
  show_on_caseworker_report: false
  redactable: true
  redact_type: string
- name: last_name
  description: Applicant last name
  required: false
  data_type: string
  form_field_type: text_field
  show_on_applicant_form: false
  show_on_caseworker_form: true
  show_on_caseworker_report: false
  redactable: true
  redact_type: string

