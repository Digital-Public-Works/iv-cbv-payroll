# ==========================================
# INTEGRATION TEST PARTNER CONFIGURATION
# Purpose: Multi-transmit partner for local e2e testing against Docker services.
# Requires docker-compose.integration.yml services to be running.
#
# Setup:
#   1. Start Docker services:
#      docker compose -f docker-compose.integration.yml up -d
#
#   2. Run the integration setup rake task:
#      bundle exec rake integration:setup
#
#      This generates a GPG keypair, applies this config, and creates a test user.
#
#   3. Start the Rails server and log in at /integration_test
# ==========================================

---
partner_id: integration_test
name: Integration Test Partner
state_name: Testonia
timezone: America/New_York
domain: integration-test
website: https://integration-test.example.org/
logo_path: des_logo.png
argyle_environment: sandbox
active_demo: true
active_prod: false
pilot_ended: false
staff_portal_enabled: false
generic_links_enabled: true
invitation_links_enabled: false
invitation_valid_days_default: 10
pay_income_days_w2: 90
pay_income_days_gig: 90
report_customization_show_earnings_list: true
weekly_report_enabled: false

transmission_methods:
# 1. Webhook — hits the dicit-webhook-api-ref-impl on port 9292
- method_type: webhook
  configs:
  - key: webhook_url
    encrypted: false
    value: "http://localhost:9292/api/v1/income-report"
  - key: api_key
    encrypted: false
    value: "my-secure-guid"

# 2. Encrypted S3 — disabled for now (outdated/inactive)
# - method_type: encrypted_s3
#   configs:
#   - key: bucket
#     encrypted: false
#     value: "test-bucket"
#   - key: public_key
#     encrypted: false
#     value: "GENERATED_BY_RAKE_TASK"

# 3. SFTP — uploads to Docker SFTP on port 2222
- method_type: sftp
  configs:
  - key: user
    encrypted: false
    value: "testuser"
  - key: password
    encrypted: false
    value: "testpass"
  - key: url
    encrypted: false
    value: "localhost"
  - key: port
    encrypted: false
    value: "2222"
  - key: sftp_directory
    encrypted: false
    value: "upload"

# 4. JSON API — disabled for now (outdated/inactive)
# - method_type: json
#   configs:
#   - key: url
#     encrypted: false
#     value: "http://localhost:4567/api/v1/transmissions"
#   - key: include_report_pdf
#     encrypted: false
#     value: "true"

# 5. Shared email — disabled for now (outdated/inactive)
# - method_type: shared_email
#   configs:
#   - key: email
#     encrypted: false
#     value: "caseworker@integration-test.local"

application_attributes:
