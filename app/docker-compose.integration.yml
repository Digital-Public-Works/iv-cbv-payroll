services:
  # SFTP server for testing SftpTransmitter
  # Files uploaded to /upload/<user>/
  sftp:
    image: atmoz/sftp:latest
    ports:
      - "2222:22"
    command: testuser:testpass:::upload
    volumes:
      - ./tmp/integration_transmissions/sftp:/home/testuser/upload

  # Webhook API reference implementation
  # https://github.com/Digital-Public-Works/dicit-webhook-api-ref-impl
  # Validates payload schema, API key auth, and HMAC signatures.
  webhook-api:
    build: https://github.com/Digital-Public-Works/dicit-webhook-api-ref-impl.git#main
    ports:
      - "9292:9292"
    environment:
      VMI_API_KEY: my-secure-guid
      PAYLOAD_DIR: /data/received
    volumes:
      - ./tmp/integration_transmissions/webhook:/data/received

  # S3-compatible object storage for testing UnencryptedS3Transmitter and
  # EncryptedS3Transmitter.
  s3:
    image: andrewgaul/s3proxy:latest
    ports:
      - "9000:80"
    environment:
      S3PROXY_AUTHORIZATION: aws-v2-or-v4
      S3PROXY_IDENTITY: s3test
      S3PROXY_CREDENTIAL: s3test
      JCLOUDS_PROVIDER: filesystem
      JCLOUDS_FILESYSTEM_BASEDIR: /data
    volumes:
      - ./tmp/integration_transmissions/s3:/data
